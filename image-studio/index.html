<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Image Studio — AWKN</title>
  <link rel="icon" href="../favicon.ico">
  <link rel="stylesheet" href="studio.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
</head>
<body>
  <!-- LOGIN GATE -->
  <div id="loginGate" class="login-gate">
    <div class="login-card">
      <h1>Image Studio</h1>
      <p class="login-sub">AI image generation powered by Gemini 2.5 Flash Image</p>
      <button id="signInBtn" class="btn-google">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#fff" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#fff" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" opacity=".9"/><path fill="#fff" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" opacity=".7"/><path fill="#fff" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" opacity=".8"/></svg>
        <span>Sign in with Google</span>
      </button>
      <p class="login-error" id="loginError"></p>
    </div>
  </div>

  <!-- APP -->
  <div id="app" class="app hidden">
    <header class="topbar">
      <div class="topbar__brand">
        <span class="brand-mark">◈</span>
        <span class="brand-name">Image Studio</span>
      </div>
      <div class="topbar__user">
        <span id="userEmail"></span>
        <button id="signOutBtn" class="btn-text">Sign out</button>
      </div>
    </header>

    <main class="main">
      <!-- GENERATOR PANEL -->
      <section class="panel panel--generator">
        <h2 class="panel__title">Generate</h2>

        <label class="field">
          <span class="field__label">Prompt</span>
          <textarea id="promptInput" rows="4" placeholder="Describe the image you want... e.g. 'A serene mountain ranch at golden hour with prairie wildflowers in the foreground, photorealistic'"></textarea>
        </label>

        <div class="field-row">
          <label class="field">
            <span class="field__label">Style</span>
            <select id="styleSelect">
              <option value="">Default</option>
              <option value="photorealistic">Photorealistic</option>
              <option value="cinematic">Cinematic</option>
              <option value="illustration">Illustration</option>
              <option value="watercolor">Watercolor</option>
              <option value="minimal">Minimal / Flat</option>
              <option value="marketing">Marketing / Wellness</option>
              <option value="medical">Medical / Clinical</option>
              <option value="logo">Logo</option>
            </select>
          </label>

          <label class="field">
            <span class="field__label">Aspect Ratio</span>
            <select id="aspectSelect">
              <option value="1:1">Square (1:1)</option>
              <option value="16:9">Landscape (16:9)</option>
              <option value="9:16">Portrait (9:16)</option>
              <option value="4:3">4:3</option>
              <option value="3:4">3:4</option>
              <option value="21:9">Ultra Wide (21:9)</option>
            </select>
          </label>
        </div>

        <label class="field">
          <span class="field__label">Tags <span class="field__hint">(comma-separated, optional)</span></span>
          <input id="tagsInput" type="text" placeholder="e.g. retreat, marketing, hero">
        </label>

        <div class="quick-tags">
          <span class="quick-tag-label">Quick tag:</span>
          <button class="quick-tag" data-tag="investor">investor</button>
          <button class="quick-tag" data-tag="retreat">retreat</button>
          <button class="quick-tag" data-tag="marketing">marketing</button>
          <button class="quick-tag" data-tag="emr">emr</button>
          <button class="quick-tag" data-tag="social">social</button>
          <button class="quick-tag" data-tag="hero">hero</button>
        </div>

        <button id="generateBtn" class="btn-primary btn-generate">
          <span class="btn-icon">✨</span>
          <span id="generateBtnLabel">Generate Image</span>
        </button>

        <div id="genStatus" class="gen-status hidden"></div>

        <!-- LATEST RESULT -->
        <div id="resultPanel" class="result-panel hidden">
          <div class="result-image-wrap">
            <img id="resultImage" alt="Generated image">
          </div>
          <div class="result-meta">
            <div class="result-prompt" id="resultPrompt"></div>
            <div class="result-actions">
              <button class="btn-secondary" id="copyUrlBtn">📋 Copy URL</button>
              <button class="btn-secondary" id="downloadBtn">⬇ Download</button>
              <button class="btn-secondary" id="regenerateBtn">↻ Regenerate</button>
              <button class="btn-danger" id="deleteResultBtn">🗑 Delete</button>
            </div>
            <div class="result-url" id="resultUrl"></div>
          </div>
        </div>
      </section>

      <!-- GALLERY PANEL -->
      <section class="panel panel--gallery">
        <div class="gallery-header">
          <h2 class="panel__title">Library</h2>
          <div class="gallery-controls">
            <input id="gallerySearch" type="text" placeholder="Search prompts or tags...">
            <select id="galleryFilter">
              <option value="">All tags</option>
            </select>
            <button id="refreshGalleryBtn" class="btn-text">↻</button>
          </div>
        </div>
        <div id="galleryGrid" class="gallery-grid">
          <div class="gallery-empty">Loading...</div>
        </div>
      </section>
    </main>
  </div>

  <!-- LIGHTBOX -->
  <div id="lightbox" class="lightbox hidden">
    <div class="lightbox__overlay"></div>
    <div class="lightbox__content">
      <button class="lightbox__close" id="lightboxClose">×</button>
      <img id="lightboxImg" alt="">
      <div class="lightbox__info">
        <div id="lightboxPrompt" class="lightbox__prompt"></div>
        <div id="lightboxMeta" class="lightbox__meta"></div>
        <div class="lightbox__actions">
          <button class="btn-secondary" id="lightboxCopyBtn">📋 Copy URL</button>
          <button class="btn-secondary" id="lightboxDownloadBtn">⬇ Download</button>
          <button class="btn-danger" id="lightboxDeleteBtn">🗑 Delete</button>
        </div>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
</body>
</html>
