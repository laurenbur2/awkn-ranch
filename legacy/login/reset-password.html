<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="icon" type="image/png" href="../favicon.png">
  <link rel="apple-touch-icon" href="../apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <title>Reset Password — AWKN Ranch</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --font-heading: 'Cormorant Garamond', serif;
      --font-body: 'Montserrat', sans-serif;
      --brown-dark: #3a2a1a;
      --brown: #6b4c2a;
      --brown-light: #a67c52;
      --cream: #f5f0e8;
      --offwhite: #faf8f4;
      --white: #ffffff;
      --error: #e07a5f;
      --error-light: #fdf0ec;
      --success: #2d8659;
      --success-light: #e5f4ed;
      --border: rgba(0,0,0,0.08);
      --radius: 12px;
    }

    body {
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 2rem 1rem;
      -webkit-font-smoothing: antialiased;
      color: var(--brown-dark);
    }

    .bg { position: fixed; inset: 0; z-index: 0; }
    .bg img { width: 100%; height: 100%; object-fit: cover; }
    .bg-overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(160deg, rgba(26,20,13,0.75) 0%, rgba(26,20,13,0.55) 50%, rgba(26,20,13,0.70) 100%);
      z-index: 1;
    }

    .login-container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 420px;
    }

    .login-card {
      background: rgba(255,255,255,0.97);
      backdrop-filter: blur(20px);
      border-radius: 16px;
      padding: 2.5rem 2.25rem 2rem;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25), 0 0 0 1px rgba(255,255,255,0.1);
      text-align: center;
    }

    .logo { margin-bottom: 1rem; }
    .logo img { display: block; width: 140px; height: auto; margin: 0 auto; }

    h1 {
      font-family: var(--font-heading);
      font-size: 1.75rem;
      font-weight: 500;
      color: var(--brown-dark);
      margin-bottom: 0.25rem;
      letter-spacing: 0.02em;
    }

    .subtitle {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--brown-light);
      margin-bottom: 1.5rem;
    }

    .lede {
      font-size: 13px;
      color: var(--brown);
      margin-bottom: 1.25rem;
    }

    .input-group { margin-bottom: 0.875rem; text-align: left; }
    .input-group label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--brown);
      margin-bottom: 6px;
    }
    .input-group input {
      width: 100%;
      padding: 12px 16px;
      font-family: var(--font-body);
      font-size: 14px;
      color: var(--brown-dark);
      background: var(--offwhite);
      border: 1px solid var(--border);
      border-radius: 10px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-group input:focus {
      border-color: var(--brown-light);
      box-shadow: 0 0 0 3px rgba(166,124,82,0.12);
      background: var(--white);
    }
    .input-group input::placeholder { color: #bbb; }

    .btn-primary {
      width: 100%;
      padding: 14px;
      margin-top: 0.25rem;
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--white);
      background: var(--brown);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.1s, box-shadow 0.2s;
    }
    .btn-primary:hover { background: var(--brown-dark); box-shadow: 0 4px 12px rgba(58,42,26,0.25); }
    .btn-primary:active { transform: scale(0.99); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

    .loading { display: flex; flex-direction: column; align-items: center; gap: 1rem; padding: 1.5rem 0; }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(166,124,82,0.2);
      border-top-color: var(--brown);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box {
      background: var(--error-light);
      border: 1px solid var(--error);
      border-radius: var(--radius);
      padding: 0.875rem 1rem;
      margin-bottom: 1rem;
      color: var(--error);
      font-size: 13px;
      text-align: left;
    }
    .error-box p { margin: 0; }

    .success-box {
      background: var(--success-light);
      border: 1px solid var(--success);
      border-radius: var(--radius);
      padding: 0.875rem 1rem;
      margin-bottom: 1rem;
      color: var(--success);
      font-size: 13px;
      text-align: left;
    }
    .success-box p { margin: 0; }

    .hidden { display: none !important; }

    .back-link {
      display: block;
      margin-top: 1.25rem;
      color: var(--brown-light);
      text-decoration: none;
      font-size: 12px;
      letter-spacing: 0.5px;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--brown); }

    @media (max-width: 480px) {
      .login-card { padding: 2rem 1.5rem 1.75rem; }
      body { padding: 1.5rem 0.75rem 4rem; }
    }
  </style>
</head>
<body>
  <div class="bg">
    <img src="https://images.squarespace-cdn.com/content/v1/676255f9d9be920b868bbb78/06146aa7-574c-40e2-b352-7dbdaec35e97/PC230187-Enhanced-NR.jpg" alt="">
  </div>
  <div class="bg-overlay"></div>

  <div class="login-container">
    <div class="login-card">
      <div class="logo"><img src="https://images.squarespace-cdn.com/content/v1/676255f9d9be920b868bbb78/e7642ed2-f2d9-40e4-94b8-bbf5eb1ab229/Transparent+Brown_black.jpg" alt="AWKN Ranch logo"></div>
      <div class="subtitle">Team Portal</div>

      <h1>Reset Password</h1>
      <p class="lede">Enter your email to receive a reset link.</p>

      <!-- Reset form -->
      <div id="resetContent">
        <form id="resetForm">
          <div class="input-group">
            <label for="emailInput">Email</label>
            <input type="email" id="emailInput" placeholder="you@example.com" required autocomplete="email">
          </div>
          <button type="submit" class="btn-primary">Send reset link</button>
        </form>
      </div>

      <!-- Loading state -->
      <div id="loadingContent" class="hidden">
        <div class="loading">
          <div class="spinner"></div>
          <p>Sending reset link...</p>
        </div>
      </div>

      <!-- Success state -->
      <div id="successContent" class="hidden">
        <div class="success-box">
          <p>Check your email for a reset link.</p>
        </div>
        <p style="color: var(--brown-light); font-size: 12px;">
          If you don't see the email in a few minutes, check your spam folder.
        </p>
      </div>

      <!-- Error state -->
      <div id="errorContent" class="hidden">
        <div class="error-box">
          <p id="errorMessage">An error occurred</p>
        </div>
        <button id="retryBtn" class="btn-primary">Try Again</button>
      </div>

      <a href="/login/" class="back-link">&larr; Back to Sign in</a>
    </div>
  </div>

  <script type="module" src="../shared/version-info.js"></script>
  <script type="module">
    import { resetPasswordForEmail, getBasePath } from '../shared/auth.js';

    const resetContent = document.getElementById('resetContent');
    const loadingContent = document.getElementById('loadingContent');
    const successContent = document.getElementById('successContent');
    const errorContent = document.getElementById('errorContent');
    const errorMessage = document.getElementById('errorMessage');
    const resetForm = document.getElementById('resetForm');
    const retryBtn = document.getElementById('retryBtn');

    function showState(state, message = '') {
      resetContent.classList.add('hidden');
      loadingContent.classList.add('hidden');
      successContent.classList.add('hidden');
      errorContent.classList.add('hidden');

      switch (state) {
        case 'reset':
          resetContent.classList.remove('hidden');
          break;
        case 'loading':
          loadingContent.classList.remove('hidden');
          break;
        case 'success':
          successContent.classList.remove('hidden');
          break;
        case 'error':
          errorContent.classList.remove('hidden');
          errorMessage.textContent = message || 'An error occurred';
          break;
      }
    }

    resetForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      showState('loading');

      const email = document.getElementById('emailInput').value.trim();
      const redirectTo = window.location.origin + getBasePath() + '/login/update-password.html';

      try {
        await resetPasswordForEmail(email, redirectTo);
        showState('success');
      } catch (error) {
        console.error('Password reset error:', error);
        showState('error', error.message);
      }
    });

    retryBtn.addEventListener('click', () => {
      showState('reset');
    });

    showState('reset');
  </script>
</body>
</html>
