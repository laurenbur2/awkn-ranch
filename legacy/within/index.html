<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="icon" type="image/png" href="../favicon.png">
  <link rel="apple-touch-icon" href="../apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap">
  <title>Within - Sign In</title>
  <style>
    :root {
      --bg: #0f0f0f;
      --bg-card: #1a1a1a;
      --text: #f5f5f5;
      --text-muted: #8a8a8a;
      --border: #2a2a2a;
      --accent: #c9a96e;
      --accent-hover: #b8953d;
      --accent-light: rgba(201, 169, 110, 0.12);
      --error: #e07a5f;
      --error-light: rgba(224, 122, 95, 0.12);
      --radius: 16px;
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.4), 0 2px 8px rgba(0,0,0,0.2);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    /* Show loading state immediately, JS will swap to login/error */

    .login-container {
      width: 100%;
      max-width: 400px;
    }

    .login-card {
      background: var(--bg-card);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      padding: 3rem 2.5rem;
      text-align: center;
      border: 1px solid var(--border);
    }

    .logo { margin-bottom: 0.5rem; }
    .logo img {
      width: 260px;
      height: auto;
    }

    /* Make white SVG background transparent on dark bg */
    .logo img[src$=".svg"] {
      filter: none;
    }

    .brand-name {
      font-family: 'DM Sans', sans-serif;
      font-size: 1.75rem;
      font-weight: 300;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 0.8125rem;
      margin-bottom: 2rem;
      letter-spacing: 0.05em;
    }

    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      width: 100%;
      padding: 0.875rem 1.5rem;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      color: #0f0f0f;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-google:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(201, 169, 110, 0.3);
    }

    .btn-google svg { width: 20px; height: 20px; }

    .divider-line {
      height: 1px;
      background: var(--border);
      margin: 1.5rem 0;
    }

    .access-note {
      font-size: 0.75rem;
      color: var(--text-muted);
      line-height: 1.6;
    }

    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box {
      background: var(--error-light);
      border: 1px solid var(--error);
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: 1.5rem;
      color: var(--error);
      font-size: 0.875rem;
    }

    .btn-secondary {
      display: inline-block;
      padding: 0.625rem 1.25rem;
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      margin-top: 1rem;
      transition: all 0.15s ease;
    }

    .btn-secondary:hover {
      border-color: var(--text-muted);
      color: var(--text);
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="logo">
        <img src="../assets/branding/awkn-wordmark-copper.svg" alt="AWKN - Ancient Wisdom Known Now">
      </div>
      <div class="brand-name">Within</div>
      <p class="subtitle">Ketamine-Assisted Therapy Platform</p>

      <!-- Login content -->
      <div id="loginContent">
        <button id="googleSignIn" class="btn-google">
          <svg viewBox="0 0 24 24">
            <path fill="#fff" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" opacity=".7"/>
            <path fill="#fff" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" opacity=".85"/>
            <path fill="#fff" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" opacity=".6"/>
            <path fill="#fff" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" opacity=".75"/>
          </svg>
          Sign in with Google
        </button>

        <div class="divider-line"></div>

        <p class="access-note">
          Authorized access only. Contact your administrator if you need access to this system.
        </p>
      </div>

      <!-- Loading state -->
      <div id="loadingContent" class="hidden">
        <div class="loading">
          <div class="spinner"></div>
          <p style="color: var(--text-muted); font-size: 0.875rem;">Signing in...</p>
        </div>
      </div>

      <!-- Error state -->
      <div id="errorContent" class="hidden">
        <div class="error-box">
          <p id="errorMessage">An error occurred</p>
        </div>
        <button id="retryBtn" class="btn-secondary">Try Again</button>
      </div>

      <!-- Unauthorized state -->
      <div id="unauthorizedContent" class="hidden">
        <div class="error-box">
          <p style="font-weight: 600; margin-bottom: 0.375rem;">Access Denied</p>
          <p>Your account (<strong id="deniedEmail"></strong>) is not authorized to access Within.</p>
        </div>
        <button id="signOutBtn" class="btn-secondary">Sign out & try another account</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
