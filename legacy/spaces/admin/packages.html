<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Packages - AWKN Dashboard</title>
  <link rel="icon" type="image/png" href="../../favicon.png">
  <link rel="apple-touch-icon" href="../../apple-touch-icon.png">
  <script>try{var c=localStorage.getItem("awkn-ranch-cached-auth");if(c&&JSON.parse(c).appUser)document.documentElement.dataset.cachedAuth="1"}catch(e){}</script>
  <style>.hidden{display:none!important}[data-cached-auth] #loadingOverlay{opacity:0!important;pointer-events:none!important;visibility:hidden!important}[data-cached-auth] #appContent.hidden{display:block!important}#loadingOverlay{position:fixed;inset:0;background:#f6f5f0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;transition:opacity .16s ease-out}.loading-overlay__logo{display:flex;align-items:center;gap:.75rem;min-height:40px}.loading-overlay__icon{height:40px;width:auto;max-width:none}.loading-overlay__wordmark{height:28px;width:auto;max-width:none}</style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css?v=5">
  <link rel="stylesheet" href="styles.css?v=5">
  <link rel="stylesheet" href="manage-shared.css?v=1">
  <link rel="stylesheet" href="../../styles/site.css">
  <link rel="stylesheet" href="../../styles/tailwind.out.css">
  <style>
    .pkg-page { max-width: 1200px; margin: 0 auto; padding: 24px 20px 48px; }
    .pkg-head { display:flex; align-items:flex-end; justify-content:space-between; flex-wrap:wrap; gap:12px; margin-bottom:8px; }
    .pkg-head h1 { margin:0; font-size:28px; font-weight:700; color:#2c1f10; }
    .pkg-head .pkg-sub { color:#6b4a1f; font-size:14px; margin-top:4px; }
    .pkg-group { margin-top:32px; }
    .pkg-group-title { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:#8a5a1a; margin-bottom:12px; }
    .pkg-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:16px; }
    .pkg-card {
      background:#fff;
      border:1px solid #e6d9c2;
      border-radius:12px;
      padding:20px;
      display:flex;
      flex-direction:column;
      gap:12px;
      box-shadow:0 1px 3px rgba(0,0,0,.04);
      transition:transform .12s ease, box-shadow .12s ease;
    }
    .pkg-card:hover { transform:translateY(-1px); box-shadow:0 4px 12px rgba(0,0,0,.08); }
    .pkg-card-title { font-size:16px; font-weight:700; color:#2c1f10; line-height:1.3; }
    .pkg-card-desc { font-size:12px; color:#7a6a56; line-height:1.4; }
    .pkg-card-price { font-size:22px; font-weight:700; color:#d4883a; }
    .pkg-card-price-promo { font-size:13px; color:#6b4a1f; text-decoration:line-through; margin-left:6px; font-weight:400; }
    .pkg-includes { border-top:1px solid #f2e6d1; padding-top:10px; display:flex; flex-direction:column; gap:6px; }
    .pkg-includes-label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.8px; color:#a58459; }
    .pkg-item {
      display:flex;
      align-items:center;
      gap:8px;
      font-size:13px;
      color:#2c1f10;
    }
    .pkg-item-qty {
      flex:0 0 auto;
      min-width:28px;
      padding:2px 8px;
      background:#d4883a;
      color:#fff;
      border-radius:999px;
      font-weight:700;
      font-size:11px;
      text-align:center;
    }
    .pkg-item-qty.single { background:#f3ece0; color:#6b4a1f; }
    .pkg-item-name { flex:1; min-width:0; }
    .pkg-item-dur { font-size:11px; color:#a58459; }
    .pkg-empty { text-align:center; padding:60px 20px; color:#7a6a56; font-size:14px; }
    .pkg-loading { text-align:center; padding:60px 20px; color:#7a6a56; font-size:13px; }
  </style>
</head>
<body>
  <div id="toastContainer" class="toast-container"></div>

  <div id="loadingOverlay">
    <div class="loading-overlay__logo">
      <img src="../../assets/branding/logo-black-transparent.png" alt="" class="loading-overlay__icon" onerror="this.style.display='none'">
      <img src="../../assets/branding/wordmark-black-transparent.png" alt="" class="loading-overlay__wordmark" onerror="this.style.display='none'">
    </div>
    <div class="loading-spinner"></div>
  </div>

  <div id="unauthorizedOverlay" class="hidden"></div>

  <div id="siteHeader"></div>

  <main id="appContent" class="admin-main hidden">
    <div class="context-switcher hidden" id="contextSwitcher"></div>
    <div class="manage-tabs"></div>

    <div class="pkg-page">
      <div class="pkg-head">
        <div>
          <h1>Packages</h1>
          <div class="pkg-sub">Active retreat and treatment packages. Edit in Clients &rsaquo; Services.</div>
        </div>
      </div>
      <div id="pkg-body">
        <div class="pkg-loading">Loading packages&hellip;</div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
  <script type="module" src="packages.js"></script>
</body>
</html>
