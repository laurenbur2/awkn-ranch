name: Deploy Supabase Functions

on:
  push:
    branches: ["main"]
    paths:
      - "supabase/functions/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy send-email function
        run: |
          supabase functions deploy send-email \
            --project-ref lnqxarwqckpmirpmixcw \
            --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy send-grounds-checklist function
        run: |
          supabase functions deploy send-grounds-checklist \
            --project-ref lnqxarwqckpmirpmixcw \
            --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
