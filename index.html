<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWKN Ranch | Team Portal</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --font-heading: 'Cormorant Garamond', serif;
            --font-body: 'Montserrat', sans-serif;
            --brown-dark: #3a2a1a;
            --brown: #6b4c2a;
            --brown-light: #a67c52;
            --cream: #f5f0e8;
            --offwhite: #faf8f4;
            --white: #ffffff;
            --error: #e07a5f;
        }

        body {
            font-family: var(--font-body);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .bg {
            position: fixed;
            inset: 0;
            z-index: 0;
        }
        .bg img {
            width: 100%; height: 100%;
            object-fit: cover;
        }
        .bg-overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(160deg, rgba(26,20,13,0.75) 0%, rgba(26,20,13,0.55) 50%, rgba(26,20,13,0.70) 100%);
            z-index: 1;
        }

        .portal {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            padding: 1.5rem;
        }

        .card {
            background: rgba(255,255,255,0.97);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 3rem 2.5rem 2.5rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25), 0 0 0 1px rgba(255,255,255,0.1);
        }

        .card-logo {
            display: block;
            width: 140px;
            height: auto;
            margin: 0 auto 1.5rem;
        }

        .card-eyebrow {
            text-align: center;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--brown-light);
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }
        .form-label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--brown);
            margin-bottom: 6px;
        }
        .form-input {
            width: 100%;
            padding: 12px 16px;
            font-family: var(--font-body);
            font-size: 14px;
            color: var(--brown-dark);
            background: var(--offwhite);
            border: 1px solid rgba(0,0,0,0.08);
            border-radius: 10px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-input:focus {
            border-color: var(--brown-light);
            box-shadow: 0 0 0 3px rgba(166,124,82,0.12);
        }
        .form-input::placeholder {
            color: #bbb;
        }

        .btn-google {
            width: 100%;
            padding: 14px;
            margin-top: 0.5rem;
            font-family: var(--font-body);
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1px;
            color: var(--brown-dark);
            background: var(--white);
            border: 1px solid rgba(0,0,0,0.12);
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-google:hover {
            background: var(--offwhite);
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .btn-google:active {
            transform: scale(0.99);
        }
        .btn-google:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .google-icon {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }
        .btn-google.loading .google-icon,
        .btn-google.loading .btn-text { display: none; }
        .btn-google.loading .spinner {
            display: block;
            border-color: rgba(58,42,26,0.2);
            border-top-color: var(--brown-dark);
        }

        .error-msg {
            background: rgba(224,122,95,0.1);
            border: 1px solid var(--error);
            border-radius: 8px;
            padding: 10px 14px;
            margin-bottom: 1rem;
            font-size: 13px;
            color: var(--error);
            display: none;
        }
        .error-msg.visible { display: block; }

        .forgot-link {
            display: block;
            text-align: center;
            margin-top: 1.25rem;
            font-size: 12px;
            color: var(--brown-light);
            text-decoration: none;
            transition: color 0.2s;
        }
        .forgot-link:hover { color: var(--brown); }

        .tagline {
            text-align: center;
            margin-top: 2rem;
            font-family: var(--font-heading);
            font-size: 15px;
            font-style: italic;
            color: rgba(255,255,255,0.5);
            letter-spacing: 0.5px;
        }

        .page-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 10;
            text-align: center;
            padding: 1.25rem;
            font-size: 11px;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.3);
        }

        .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: var(--white);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin: 0 auto;
        }
        .loading .spinner { display: block; }
        .loading .btn-text { display: none; }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .card {
                padding: 2.5rem 1.75rem 2rem;
            }
            .portal {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>

    <div class="bg">
        <img src="https://images.squarespace-cdn.com/content/v1/676255f9d9be920b868bbb78/06146aa7-574c-40e2-b352-7dbdaec35e97/PC230187-Enhanced-NR.jpg" alt="">
    </div>
    <div class="bg-overlay"></div>

    <div class="portal">
        <div class="card">
            <img src="https://images.squarespace-cdn.com/content/v1/676255f9d9be920b868bbb78/e7642ed2-f2d9-40e4-94b8-bbf5eb1ab229/Transparent+Brown_black.jpg" alt="AWKN Ranch" class="card-logo">
            <div class="card-eyebrow">Team Portal</div>

            <div class="error-msg" id="errorMsg"></div>

            <button type="button" class="btn-google" id="googleSignInBtn">
                <svg class="google-icon" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
                    <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>
                    <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>
                    <path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/>
                    <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/>
                </svg>
                <span class="btn-text">Sign in with Google</span>
                <div class="spinner"></div>
            </button>
        </div>

        <div class="tagline">Where consciousness meets community.</div>
    </div>

    <div class="page-footer">AWKN Ranch · Austin, TX</div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
    <script>
        const SUPABASE_URL = 'https://lnqxarwqckpmirpmixcw.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxucXhhcndxY2twbWlycG1peGN3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxMjAyMDIsImV4cCI6MjA4NzY5NjIwMn0.bw8b5XUcEFExlfTrR78Bu4Vdl7Oe_RtjlgvWA7SlQfo';
        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const CACHED_AUTH_KEY = 'awkn-ranch-cached-auth';
        const REDIRECT_URL = '/awkn-ranch/spaces/admin/spaces.html';
        const OAUTH_RETURN_URL = window.location.origin + '/awkn-ranch/';

        const errorMsg = document.getElementById('errorMsg');
        const googleBtn = document.getElementById('googleSignInBtn');

        // Check for existing session on load (handles OAuth callback too)
        (async function checkSession() {
            try {
                const { data } = await sb.auth.getSession();
                if (data.session) {
                    localStorage.setItem(CACHED_AUTH_KEY, JSON.stringify({
                        email: data.session.user.email,
                        ts: Date.now()
                    }));
                    window.location.href = REDIRECT_URL;
                }
            } catch(e) {}
        })();

        googleBtn.addEventListener('click', async () => {
            errorMsg.classList.remove('visible');
            googleBtn.classList.add('loading');
            googleBtn.disabled = true;

            try {
                const { error } = await sb.auth.signInWithOAuth({
                    provider: 'google',
                    options: {
                        redirectTo: OAUTH_RETURN_URL
                    }
                });

                if (error) {
                    errorMsg.textContent = error.message || 'Unable to sign in with Google.';
                    errorMsg.classList.add('visible');
                    googleBtn.classList.remove('loading');
                    googleBtn.disabled = false;
                }
                // On success, browser redirects to Google; no further handling needed
            } catch (err) {
                errorMsg.textContent = 'Something went wrong. Please try again.';
                errorMsg.classList.add('visible');
                googleBtn.classList.remove('loading');
                googleBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
