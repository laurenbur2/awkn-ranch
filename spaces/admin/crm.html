<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>CRM - AWKN Dashboard</title>
  <link rel="icon" type="image/png" href="../../favicon.png">
  <link rel="apple-touch-icon" href="../../apple-touch-icon.png">
  <script>try{var c=localStorage.getItem("awkn-ranch-cached-auth");if(c&&JSON.parse(c).appUser)document.documentElement.dataset.cachedAuth="1"}catch(e){}</script>
  <style>.hidden{display:none!important}[data-cached-auth] #loadingOverlay{opacity:0!important;pointer-events:none!important;visibility:hidden!important}[data-cached-auth] #appContent.hidden{display:block!important}#loadingOverlay{position:fixed;inset:0;background:#f6f5f0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;transition:opacity .16s ease-out}.loading-overlay__logo{display:flex;align-items:center;gap:.75rem;min-height:40px}.loading-overlay__icon{height:40px;width:auto;max-width:none}.loading-overlay__wordmark{height:28px;width:auto;max-width:none}</style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css?v=5">
  <link rel="stylesheet" href="styles.css?v=5">
  <link rel="stylesheet" href="manage-shared.css?v=1">
  <link rel="stylesheet" href="crm.css?v=3">
  <link rel="stylesheet" href="../../styles/site.css">
  <link rel="stylesheet" href="../../styles/tailwind.out.css">
</head>
<body>
  <div id="toastContainer" class="toast-container"></div>

  <div id="imageLightbox" class="lightbox hidden">
    <button class="lightbox-close">&times;</button>
    <button class="lightbox-nav lightbox-prev" id="lightboxPrev">&#10094;</button>
    <img id="lightboxImage" src="" alt="">
    <button class="lightbox-nav lightbox-next" id="lightboxNext">&#10095;</button>
  </div>

  <div id="loadingOverlay">
    <div class="loading-overlay__logo">
      <img src="../../assets/branding/logo-black-transparent.png" alt="" class="loading-overlay__icon" onerror="this.style.display='none'">
      <img src="../../assets/branding/wordmark-black-transparent.png" alt="" class="loading-overlay__wordmark" onerror="this.style.display='none'">
    </div>
    <div class="loading-spinner"></div>
  </div>

  <div id="unauthorizedOverlay" class="hidden"></div>

  <div id="siteHeader"></div>

  <main id="appContent" class="admin-main hidden">
    <div class="context-switcher hidden" id="contextSwitcher"></div>
    <div class="manage-tabs"></div>

    <div class="crm-page">
      <!-- Business Line Switcher — JS populates buttons -->
      <div class="crm-biz-switcher" id="crm-biz-switcher"></div>

      <!-- Stats Bar — JS populates stat cards -->
      <div class="crm-stats" id="crm-stats"></div>

      <!-- Sub-tabs — JS populates tab buttons -->
      <div class="crm-subtabs" id="crm-subtabs"></div>

      <!-- All panels — wrapped for delegated event listeners -->
      <div id="crm-panels">
        <div class="crm-panel active" id="crm-panel-pipeline"></div>
        <div class="crm-panel" id="crm-panel-leads"></div>
        <div class="crm-panel" id="crm-panel-invoices"></div>
        <div class="crm-panel" id="crm-panel-proposals"></div>
        <div class="crm-panel" id="crm-panel-dashboard"></div>
      </div>
    </div>
  </main>

  <!-- Single modal container — JS generates all modal content dynamically -->
  <div id="crm-modal" style="display:none;"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
  <script type="module" src="crm.js?v=20260506b"></script>
</body>
</html>
