<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Reservations - AWKN Dashboard</title>
  <link rel="icon" type="image/png" href="../../favicon.png">
  <link rel="apple-touch-icon" href="../../apple-touch-icon.png">
  <script>try{var c=localStorage.getItem("awkn-ranch-cached-auth");if(c&&JSON.parse(c).appUser)document.documentElement.dataset.cachedAuth="1"}catch(e){}</script>
  <style>.hidden{display:none!important}[data-cached-auth] #loadingOverlay{opacity:0!important;pointer-events:none!important;visibility:hidden!important}[data-cached-auth] #appContent.hidden{display:block!important}#loadingOverlay{position:fixed;inset:0;background:#f6f5f0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;transition:opacity .16s ease-out}.loading-overlay__logo{display:flex;align-items:center;gap:.75rem;min-height:40px}.loading-overlay__icon{height:40px;width:auto;max-width:none}.loading-overlay__wordmark{height:28px;width:auto;max-width:none}</style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css?v=5">
  <link rel="stylesheet" href="styles.css?v=5">
  <link rel="stylesheet" href="manage-shared.css?v=1">
  <link rel="stylesheet" href="reservations.css?v=1">
  <link rel="stylesheet" href="../../styles/site.css">
  <link rel="stylesheet" href="../../styles/tailwind.out.css">
</head>
<body>
  <!-- Toast Container -->
  <div id="toastContainer" class="toast-container"></div>

  <!-- Image Lightbox -->
  <div id="imageLightbox" class="lightbox hidden">
    <button class="lightbox-close">&times;</button>
    <button class="lightbox-nav lightbox-prev" id="lightboxPrev">&#10094;</button>
    <img id="lightboxImage" src="" alt="">
    <button class="lightbox-nav lightbox-next" id="lightboxNext">&#10095;</button>
  </div>

  <div id="loadingOverlay" class="loading-overlay">
    <div class="loading-overlay__logo">
      <img src="/awkn-ranch/assets/branding/logo-black-transparent.png" alt="" class="loading-overlay__icon" width="28" height="40" onerror="this.onerror=null;this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 21 30%22%3E%3Cpath d=%22M10.5 1.5C8.3 1.5 6.5 3.3 6.5 5.5v4.1L3.8 13c-1 1.3-1.5 2.8-1.5 4.4 0 4.6 3.7 8.3 8.2 8.3s8.2-3.7 8.2-8.3c0-1.6-.5-3.2-1.5-4.4l-2.7-3.4V5.5c0-2.2-1.8-4-4-4z%22 fill=%22%231f1720%22/%3E%3Cellipse cx=%2210.5%22 cy=%2218.6%22 rx=%223.1%22 ry=%224.7%22 fill=%22%23f6f5f0%22/%3E%3C/svg%3E'">
      <img src="/awkn-ranch/assets/branding/wordmark-black-transparent.png" alt="AWKN Ranch" class="loading-overlay__wordmark" width="28" height="28" onerror="this.onerror=null;this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 120 28%22%3E%3Ctext x=%220%22 y=%2220%22 font-size=%2216%22 font-family=%22Arial,sans-serif%22 fill=%22%231f1720%22%3EProperty%3C/text%3E%3C/svg%3E'">
    </div>
    <div class="spinner spinner--sm"></div>
  </div>

  <!-- Access denied -->
  <div id="unauthorizedOverlay" class="loading-overlay hidden"></div>

  <div id="appContent" class="hidden">
    <div id="siteHeader"></div>

    <span data-site-version style="display:none">v260402.11 9:34p</span>

    <div class="context-switcher hidden" id="contextSwitcher">
      <a href="/residents/" class="context-switcher-btn">Resident</a>
      <a class="context-switcher-btn active">Staff</a>
    </div>

    <!-- Tab navigation -->
    <div class="manage-tabs">
      <!-- Tab navigation rendered by admin-shell.js -->
    </div>

    <div class="manage-container">
      <div class="manage-panel active">

        <!-- Stats Bar -->
        <div class="res-stats" id="statsBar">
          <div class="res-stat">
            <span class="res-stat-value" id="statRooms">-</span>
            <span class="res-stat-label">Beds Occupied</span>
          </div>
          <div class="res-stat">
            <span class="res-stat-value" id="statSpaces">-</span>
            <span class="res-stat-label">Active Rentals</span>
          </div>
          <div class="res-stat">
            <span class="res-stat-value" id="statActivities">-</span>
            <span class="res-stat-label">Today's Activities</span>
          </div>
        </div>

        <!-- Sub-tab Navigation -->
        <div class="res-subtabs" id="resSubtabs">
          <!-- House Stays redirects to the Retreat House Rooms page (the master
               source for per-bed occupancy with Within + venue + public stays). -->
          <button class="res-subtab" data-tab="house">House Stays</button>
          <button class="res-subtab active" data-tab="rentals">Rental Spaces</button>
          <button class="res-subtab" data-tab="activities">Activities</button>
          <button class="res-subtab" data-tab="combined">Combined</button>
        </div>

        <!-- Calendar Toolbar -->
        <div class="res-toolbar">
          <div class="res-toolbar-left">
            <button class="res-btn res-btn--icon" id="btnPrev" title="Previous">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <button class="res-btn" id="btnToday">Today</button>
            <button class="res-btn res-btn--icon" id="btnNext" title="Next">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
            <span class="res-toolbar-date" id="toolbarDate"></span>
          </div>
          <div class="res-toolbar-right">
            <div class="res-view-toggle" id="viewToggle">
              <button class="res-view-btn active" data-view="day">Day</button>
              <button class="res-view-btn" data-view="week">Week</button>
              <button class="res-view-btn" data-view="month">Month</button>
            </div>
            <button class="res-btn res-btn--primary" id="btnNewBooking">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              New Booking
            </button>
          </div>
        </div>

        <!-- Calendar Panels -->
        <div class="res-calendar-wrap">
          <!-- House Stays Calendar — embeds the per-bed Rooms calendar from
               retreat-house.html (?embed=1 strips the chrome so only the
               calendar grid + stats render inside the iframe). The standalone
               page at retreat-house.html still works for users who navigate
               there directly. -->
          <div class="res-panel active" id="panelHouse">
            <iframe id="houseStaysFrame"
                    src="retreat-house.html?embed=1&pillar=master"
                    style="width:100%; min-height: 1200px; border: none; background: transparent;"
                    title="Per-bed retreat house calendar"></iframe>
          </div>

          <!-- Rental Spaces Calendar -->
          <div class="res-panel" id="panelRentals">
            <div class="res-calendar" id="calRentals"></div>
          </div>

          <!-- Activities Calendar -->
          <div class="res-panel" id="panelActivities">
            <div class="res-filter-bar" id="activityFilterBar">
              <div class="res-filter-left">
                <label class="res-filter-label">Provider</label>
                <select class="res-filter-select" id="staffFilter">
                  <option value="all">All Staff</option>
                  <!-- Populated by JS -->
                </select>
              </div>
              <div class="res-filter-right">
                <button class="res-btn res-btn--sm" id="btnManageStaff">Manage Staff</button>
              </div>
            </div>
            <div class="res-calendar" id="calActivities"></div>
          </div>

          <!-- Combined Calendar -->
          <div class="res-panel" id="panelCombined">
            <div class="res-calendar" id="calCombined"></div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- ================================ -->
  <!-- BOOKING MODAL -->
  <!-- ================================ -->
  <div class="res-modal-overlay hidden" id="bookingModalOverlay">
    <div class="res-modal" id="bookingModal">
      <div class="res-modal-header">
        <h3 id="modalTitle">New Booking</h3>
        <button class="res-modal-close" id="modalClose">&times;</button>
      </div>
      <div class="res-modal-body" id="modalBody">
        <!-- Dynamic form content rendered by JS -->
      </div>
      <div class="res-modal-footer">
        <button class="res-btn" id="modalCancel">Cancel</button>
        <button class="res-btn res-btn--danger hidden" id="modalDelete">Delete</button>
        <button class="res-btn res-btn--primary" id="modalSave">Save Booking</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
  <script type="module" src="reservations.js"></script>
</body>
</html>
