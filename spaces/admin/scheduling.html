<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Scheduling - AWKN Dashboard</title>
  <link rel="icon" type="image/png" href="../../favicon.png">
  <link rel="apple-touch-icon" href="../../apple-touch-icon.png">
  <script>try{var c=localStorage.getItem("awkn-ranch-cached-auth");if(c&&JSON.parse(c).appUser)document.documentElement.dataset.cachedAuth="1"}catch(e){}</script>
  <style>.hidden{display:none!important}[data-cached-auth] #loadingOverlay{opacity:0!important;pointer-events:none!important;visibility:hidden!important}[data-cached-auth] #appContent.hidden{display:block!important}#loadingOverlay{position:fixed;inset:0;background:#f6f5f0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;transition:opacity .16s ease-out}.loading-overlay__logo{display:flex;align-items:center;gap:.75rem;min-height:40px}.loading-overlay__icon{height:40px;width:auto;max-width:none}.loading-overlay__wordmark{height:28px;width:auto;max-width:none}</style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css?v=5">
  <link rel="stylesheet" href="styles.css?v=5">
  <link rel="stylesheet" href="manage-shared.css?v=1">
  <link rel="stylesheet" href="scheduling.css?v=1">
  <link rel="stylesheet" href="../../styles/site.css">
  <link rel="stylesheet" href="../../styles/tailwind.out.css">
</head>
<body>
  <div id="toastContainer" class="toast-container"></div>

  <div id="imageLightbox" class="lightbox hidden">
    <button class="lightbox-close">&times;</button>
    <button class="lightbox-nav lightbox-prev" id="lightboxPrev">&#10094;</button>
    <img id="lightboxImage" src="" alt="">
    <button class="lightbox-nav lightbox-next" id="lightboxNext">&#10095;</button>
  </div>

  <div id="loadingOverlay">
    <div class="loading-overlay__logo">
      <img src="../../housephotos/logos/icon-color.png" alt="" class="loading-overlay__icon" onerror="this.style.display='none'">
      <img src="../../housephotos/logos/wordmark-color.png" alt="" class="loading-overlay__wordmark" onerror="this.style.display='none'">
    </div>
    <div class="loading-spinner"></div>
  </div>

  <div id="unauthorizedOverlay" class="hidden"></div>

  <div id="siteHeader"></div>

  <main id="appContent" class="admin-main hidden">
    <div class="manage-tabs"></div>

    <div class="sch-page">
      <!-- Stats Bar -->
      <div class="sch-stats">
        <div class="sch-stat">
          <div class="sch-stat-value" id="statCalendars">0</div>
          <div class="sch-stat-label">Connected Calendars</div>
        </div>
        <div class="sch-stat">
          <div class="sch-stat-value" id="statMonthBookings">0</div>
          <div class="sch-stat-label">Bookings This Month</div>
        </div>
        <div class="sch-stat">
          <div class="sch-stat-value" id="statUpcoming">0</div>
          <div class="sch-stat-label">Upcoming Bookings</div>
        </div>
      </div>

      <!-- Sub-tabs -->
      <div class="sch-subtabs">
        <button class="sch-subtab active" data-panel="profile">My Profile</button>
        <button class="sch-subtab" data-panel="bookings">Upcoming Bookings</button>
      </div>

      <!-- My Profile Panel -->
      <div class="sch-panel active" id="panelProfile">

        <!-- Google Calendar Connection -->
        <div class="sch-section" id="calendarSection">
          <h3 class="sch-section-title">Google Calendar</h3>
          <div id="calendarStatus">
            <!-- Populated by JS -->
          </div>
        </div>

        <!-- Availability Settings (hidden until connected) -->
        <div class="sch-section hidden" id="availabilitySection">
          <h3 class="sch-section-title">Availability Settings</h3>
          <div class="sch-form-grid">
            <div class="sch-field">
              <label class="sch-label" for="meetingDuration">Meeting Duration (minutes)</label>
              <input type="number" id="meetingDuration" class="sch-input" value="30" min="5" max="480" step="5">
            </div>
            <div class="sch-field">
              <label class="sch-label" for="bufferMinutes">Buffer Between Meetings (minutes)</label>
              <input type="number" id="bufferMinutes" class="sch-input" value="15" min="0" max="120" step="5">
            </div>
            <div class="sch-field">
              <label class="sch-label" for="advanceDays">Advance Booking Days</label>
              <input type="number" id="advanceDays" class="sch-input" value="30" min="1" max="365">
            </div>
            <div class="sch-field">
              <label class="sch-label" for="meetingTitle">Meeting Title</label>
              <input type="text" id="meetingTitle" class="sch-input" placeholder="e.g. Consultation Call">
            </div>
            <div class="sch-field sch-field--full">
              <label class="sch-label" for="meetingDescription">Meeting Description</label>
              <textarea id="meetingDescription" class="sch-textarea" rows="3" placeholder="Brief description shown to bookers..."></textarea>
            </div>
          </div>

          <h4 class="sch-section-subtitle">Available Hours</h4>
          <div class="sch-hours-grid" id="hoursGrid">
            <!-- Populated by JS for each day Mon-Sun -->
          </div>

          <h4 class="sch-section-subtitle">Booking Link</h4>
          <div class="sch-booking-link-row">
            <div class="sch-field">
              <label class="sch-label" for="bookingSlug">Booking Slug</label>
              <input type="text" id="bookingSlug" class="sch-input" readonly>
            </div>
            <div class="sch-field sch-field--full">
              <label class="sch-label">Public URL</label>
              <div class="sch-link-display">
                <span id="publicUrl" class="sch-link-text"></span>
                <button class="sch-btn sch-btn--sm" id="btnCopyLink">Copy Link</button>
              </div>
            </div>
          </div>

          <div class="sch-toggle-row">
            <label class="sch-toggle-label">
              <input type="checkbox" id="isBookable" class="sch-toggle-input">
              <span class="sch-toggle-switch"></span>
              <span>Accept Bookings</span>
            </label>
          </div>

          <div class="sch-actions">
            <button class="sch-btn sch-btn--primary" id="btnSaveSettings">Save Settings</button>
          </div>
        </div>
      </div>

      <!-- Upcoming Bookings Panel -->
      <div class="sch-panel" id="panelBookings">
        <div class="sch-table-wrap">
          <table class="sch-table" id="bookingsTable">
            <thead>
              <tr>
                <th>Date/Time</th>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="bookingsTableBody">
              <tr><td colspan="5" class="sch-empty">No bookings found.</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
  <script type="module" src="scheduling.js"></script>
</body>
</html>
