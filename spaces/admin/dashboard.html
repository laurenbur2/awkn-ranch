<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Dashboard - AWKN</title>
  <link rel="icon" type="image/png" href="../../favicon.png">
  <link rel="apple-touch-icon" href="../../apple-touch-icon.png">
  <script>try{var c=localStorage.getItem("awkn-ranch-cached-auth");if(c&&JSON.parse(c).appUser)document.documentElement.dataset.cachedAuth="1"}catch(e){}</script>
  <style>.hidden{display:none!important}[data-cached-auth] #loadingOverlay{opacity:0!important;pointer-events:none!important;visibility:hidden!important}[data-cached-auth] #appContent.hidden{display:block!important}#loadingOverlay{position:fixed;inset:0;background:#f6f5f0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;transition:opacity .16s ease-out}.loading-overlay__logo{display:flex;align-items:center;gap:.75rem;min-height:40px}.loading-overlay__icon{height:40px;width:auto;max-width:none}.loading-overlay__wordmark{height:28px;width:auto;max-width:none}</style>
  <link rel="stylesheet" href="../styles.css?v=5">
  <link rel="stylesheet" href="styles.css?v=5">
  <link rel="stylesheet" href="manage-shared.css?v=5">
  <link rel="stylesheet" href="../../styles/site.css">
  <link rel="stylesheet" href="../../styles/tailwind.out.css">
  <style>
    .dash-wrap { max-width: 1200px; margin: 0 auto; padding: 1rem 1.5rem 3rem; }
    .dash-hello { margin: 0.5rem 0 1.5rem; }
    .dash-hello h1 { font-size: 1.5rem; font-weight: 700; margin: 0 0 0.25rem; }
    .dash-hello p { margin: 0; color: var(--text-muted, #6b7280); font-size: 0.9rem; }

    .dash-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1rem;
    }
    .dash-grid.wide { grid-template-columns: 1fr; }

    .dash-card {
      background: #fff;
      border: 1px solid var(--border, #e5e7eb);
      border-radius: 12px;
      padding: 1.25rem;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
    }
    .dash-card h2 {
      font-size: 0.95rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.04em;
      color: #374151; margin: 0 0 0.75rem;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .dash-card h2 .dash-count {
      font-size: 0.7rem; font-weight: 600;
      padding: 0.15rem 0.5rem; border-radius: 999px;
      background: #f3f4f6; color: #4b5563; margin-left: auto;
    }

    .dash-empty {
      color: var(--text-muted, #6b7280);
      font-size: 0.85rem; font-style: italic; text-align: center;
      padding: 1rem 0;
    }

    /* Quick actions */
    .dash-qa-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 0.625rem;
    }
    .dash-qa {
      display: flex; flex-direction: column; align-items: flex-start;
      gap: 0.375rem; padding: 0.875rem;
      background: var(--bg, #f6f5f0);
      border: 1px solid var(--border, #e5e7eb);
      border-radius: 10px;
      text-decoration: none; color: inherit;
      transition: border-color .15s ease, transform .08s ease;
    }
    .dash-qa:hover { border-color: var(--accent, #d4883a); transform: translateY(-1px); }
    .dash-qa .dash-qa-ic {
      width: 28px; height: 28px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      background: var(--accent-light, #f3e6d3); color: var(--accent, #d4883a);
    }
    .dash-qa .dash-qa-ic svg { width: 16px; height: 16px; }
    .dash-qa .dash-qa-label { font-weight: 600; font-size: 0.82rem; }
    .dash-qa .dash-qa-sub { font-size: 0.7rem; color: var(--text-muted, #6b7280); }

    /* Today's items */
    .dash-item {
      display: flex; align-items: center; gap: 0.625rem;
      padding: 0.55rem 0; border-top: 1px solid #f3f4f6;
    }
    .dash-item:first-of-type { border-top: none; }
    .dash-item-time {
      font-size: 0.75rem; font-weight: 600;
      color: var(--accent, #d4883a); min-width: 72px;
    }
    .dash-item-body { flex: 1; min-width: 0; }
    .dash-item-title { font-size: 0.85rem; font-weight: 500; color: #111827; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .dash-item-sub { font-size: 0.72rem; color: var(--text-muted, #6b7280); }
    .dash-item-pill {
      font-size: 0.65rem; padding: 0.1rem 0.4rem;
      border-radius: 4px; background: #f3f4f6; color: #4b5563;
    }

    /* On-shift avatars */
    .dash-shift-row {
      display: flex; align-items: center; gap: 0.625rem;
      padding: 0.5rem 0; border-top: 1px solid #f3f4f6;
    }
    .dash-shift-row:first-child { border-top: none; }
    .dash-shift-av {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      background: var(--accent-light, #f3e6d3); color: var(--accent, #d4883a);
      font-weight: 700; font-size: 0.8rem; overflow: hidden; flex-shrink: 0;
    }
    .dash-shift-av img { width: 100%; height: 100%; object-fit: cover; }
    .dash-shift-name { font-size: 0.85rem; font-weight: 500; }
    .dash-shift-title { font-size: 0.7rem; color: var(--text-muted, #6b7280); }
    .dash-shift-present {
      margin-left: auto; font-size: 0.68rem; font-weight: 600;
      padding: 0.15rem 0.5rem; border-radius: 999px;
      background: #dcfce7; color: #166534;
    }
  </style>
</head>
<body>
  <div id="toastContainer" class="toast-container"></div>

  <div id="loadingOverlay" class="loading-overlay">
    <div class="loading-overlay__logo">
      <img src="/awkn-ranch/assets/branding/logo-black-transparent.png" alt="" class="loading-overlay__icon" width="28" height="40">
      <img src="/awkn-ranch/assets/branding/wordmark-black-transparent.png" alt="AWKN Ranch" class="loading-overlay__wordmark" width="28" height="28">
    </div>
    <div class="spinner spinner--sm"></div>
  </div>

  <div id="unauthorizedOverlay" class="loading-overlay hidden"></div>

  <div id="appContent" class="hidden">
    <div id="siteHeader"></div>

    <span data-site-version style="display:none"></span>

    <div class="context-switcher hidden" id="contextSwitcher">
      <a href="/residents/" class="context-switcher-btn">Resident</a>
      <a class="context-switcher-btn active">Staff</a>
    </div>

    <div class="manage-tabs"></div>

    <div class="dash-wrap">
      <div class="dash-hello">
        <h1 id="dashHello">Welcome</h1>
        <p id="dashSubhead"></p>
      </div>

      <!-- Quick actions -->
      <div class="dash-card" id="dashQuickActionsCard" style="margin-bottom:1rem;">
        <h2>Quick Actions</h2>
        <div class="dash-qa-grid" id="dashQuickActions"></div>
      </div>

      <!-- Main grid: today's schedule + on-shift -->
      <div class="dash-grid">
        <div class="dash-card hidden" id="dashScheduleCard">
          <h2>Today's Schedule <span class="dash-count" id="dashScheduleCount">0</span></h2>
          <div id="dashSchedule"></div>
        </div>

        <div class="dash-card" id="dashShiftCard">
          <h2>Staff On Shift <span class="dash-count" id="dashShiftCount">0</span></h2>
          <div id="dashShift"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="../../shared/instant-chrome.js"></script>
  <script type="module" src="../../shared/version-info.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
  <script type="module" src="dashboard.js"></script>
</body>
</html>
